name: Build Firmware CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      link: ${{ steps.filter.outputs.link }}
      net: ${{ steps.filter.outputs.net }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          link:
            - 'link/**'
          net:
            - 'firmware/net/**'
          ui:
            - 'firmware/ui/**'
            - 'firmware/shared/**'
            - 'firmware/shared_inc/**'

  test-link:
    needs: changes
    if: ${{ needs.changes.outputs.link == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run link tests
      working-directory: ./link/link
      run: cargo test --features std

  build-ctl:
    needs: changes
    if: ${{ needs.changes.outputs.link == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev

    - name: Build CTL
      working-directory: ./link/ctl
      run: cargo build --release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ctl
        path: link/ctl/target/release/ctl

  build-mgmt:
    needs: changes
    if: ${{ needs.changes.outputs.link == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install ARM target
      run: rustup target add thumbv6m-none-eabi

    - name: Install cargo-binutils
      run: cargo install cargo-binutils && rustup component add llvm-tools

    - name: Build MGMT
      working-directory: ./link/mgmt
      run: cargo objcopy --release -- -O binary target/thumbv6m-none-eabi/release/mgmt.bin

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mgmt
        path: link/mgmt/target/thumbv6m-none-eabi/release/mgmt.bin

    - name: Nightly mgmt release
      if: github.ref_name == 'main'
      uses: ncipollo/release-action@v1
      with:
        tag: nightly
        name: "Nightly Build"
        allowUpdates: true
        replacesArtifacts: true
        artifacts: link/mgmt/target/thumbv6m-none-eabi/release/mgmt.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-net:
    needs: changes
    if: ${{ needs.changes.outputs.net == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        apt-get update
        apt-get install -y make git curl unzip cmake bash pkg-config

    - name: Build
      working-directory: ./firmware/net
      shell: bash
      run: |
        . $IDF_PATH/export.sh
        make -j compile

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: net
        path: |
          firmware/net/build/bootloader/bootloader.bin
          firmware/net/build/partition_table/partition-table.bin
          firmware/net/build/net.bin
          firmware/net/build/net.elf

    - name: Upload net binary
      if: github.ref_name == 'main'
      uses: ncipollo/release-action@v1
      with:
        tag: nightly
        name: "Nightly Build"
        allowUpdates: true
        replacesArtifacts: true
        artifacts: |
          firmware/net/build/bootloader/bootloader.bin
          firmware/net/build/partition_table/partition-table.bin
          firmware/net/build/net.bin
          firmware/net/build/net.elf
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ui:
    needs: changes
    if: ${{ needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib stlink-tools python3 pip
        pip install pyserial

    - name: Build
      working-directory: ./firmware/ui
      shell: bash
      run: make -j compile

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ui
        path: |
          firmware/ui/build/ui.bin
          firmware/ui/build/ui.elf
          firmware/ui/build/ui.hex

    - name: Upload ui binary
      if: github.ref_name == 'main'
      uses: ncipollo/release-action@v1
      with:
        tag: nightly
        name: "Nightly Build"
        allowUpdates: true
        replacesArtifacts: true
        artifacts: firmware/ui/build/ui.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
